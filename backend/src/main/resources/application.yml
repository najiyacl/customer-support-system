server:
  port: 8080

spring:
  application:
    name: customer-support-system

  datasource:
    url: jdbc:postgresql://localhost:5432/customer_support
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-6
          max-tokens: 2048

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123}
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-must-be-at-least-256-bits}
    expiration-ms: 86400000  # 24 hours

logging:
  level:
    com.customersupport: DEBUG
    org.springframework.ai: INFO
